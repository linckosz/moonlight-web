# Moonlight-Web — macOS (Apple Silicon) build validation (CMake).
#
# Validates the cross-platform CMake toolchain on macOS with Homebrew OpenSSL.
# macos-latest runners are arm64; the Security/CoreFoundation frameworks are
# linked from the CMakeLists APPLE branch.
name: build-macos

on:
  pull_request:
  push:
    branches: [main]

jobs:
  macos-arm64:
    name: Backend (macOS arm64, CMake)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install cmake ninja openssl@3 pkg-config

      - name: Install Qt 6.11
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          host: mac
          arch: clang_arm64
          modules: qtwebsockets

      - name: Configure
        run: cmake -S backend -B backend/build/mac -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build backend/build/mac -j

      - name: Security TNR (ctest)
        run: ctest --test-dir backend/build/mac --output-on-failure

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mw-server-macos-arm64
          path: backend/build/mac/mw-server
          if-no-files-found: warn
