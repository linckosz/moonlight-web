# Moonlight-Web — multi-platform release packaging.
#
# On a v* tag, builds self-contained bundles for Windows x64/ARM64, Linux x64
# (AppImage) and macOS arm64 (.dmg), then attaches them to the GitHub Release.
# Each bundle ships the executable, the Qt runtime (via the native deploy tool),
# OpenSSL and the frontend/ served as static files.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows (x64 + ARM64) ────────────────────────────────────────────────
  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            qt_arch: win64_msvc2022_64
            cmake_arch: x64
          - arch: arm64
            runner: windows-11-arm
            qt_arch: win64_msvc2022_arm64
            cmake_arch: ARM64
    name: Package Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    # Grants access to the MW_* secrets (DNS/ACME config embedded at build time).
    environment: MoonlightWeb
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install OpenSSL (vcpkg, arm64 only)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: vcpkg install openssl:arm64-windows

      - uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          arch: ${{ matrix.qt_arch }}
          modules: qtwebsockets
          # aqt 3.3.0 doesn't know the new Qt 6.11 per-arch repo layout (404s on
          # Updates.xml); pin the commit that added it. py7zr 1.1.0 avoids the 7z
          # path-sanitization bug (aqtinstall#995) that breaks SBOM extraction.
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          py7zrversion: ==1.1.0
          extra: --base https://download.qt.io # official server (fallback mirrors serve incomplete XML)

      # Ninja + MSVC env: the runner's Visual Studio major version changes over
      # time, so avoid the version-pinned "Visual Studio NN" generator.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure
        shell: pwsh
        # Internet-Access config embedded at build time from repo secrets (no
        # .env shipped). Empty when a secret is unset → LAN-only fallback.
        env:
          MW_DOMAIN: ${{ secrets.MW_DOMAIN }}
          MW_PDNS_URL: ${{ secrets.MW_PDNS_URL }}
          MW_PDNS_TOKEN: ${{ secrets.MW_PDNS_TOKEN }}
          MW_ZEROSSL_EAB_KID: ${{ secrets.MW_ZEROSSL_EAB_KID }}
          MW_ZEROSSL_EAB_HMAC: ${{ secrets.MW_ZEROSSL_EAB_HMAC }}
        run: |
          $args = @("-S","backend","-B","build","-G","Ninja","-DCMAKE_BUILD_TYPE=Release")
          if ("${{ matrix.arch }}" -eq "arm64") {
            $args += "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
            $args += "-DVCPKG_TARGET_TRIPLET=arm64-windows"
          }
          cmake @args

      - name: Build
        run: cmake --build build -j

      - name: Stage bundle
        run: cmake --install build --prefix dist

      - name: Deploy Qt runtime
        run: windeployqt --release dist/moonlight-web.exe

      - name: Bundle OpenSSL (arm64)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: Copy-Item "$env:VCPKG_INSTALLATION_ROOT/installed/arm64-windows/bin/*.dll" dist/ -ErrorAction SilentlyContinue

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path dist/* -DestinationPath "moonlight-web-windows-${{ matrix.arch }}.zip"

      # Interactive installer: stepped wizard (Internet authorization, Sunshine
      # detection/silent-install + pairing, Desktop admin shortcut).
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DSourceDir=$(Resolve-Path dist)" `
            "/DMyArch=${{ matrix.arch }}" `
            "/O$(Get-Location)" `
            backend\installer\moonlight-web.iss

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            moonlight-web-windows-${{ matrix.arch }}.zip
            moonlight-web-installer-win-${{ matrix.arch }}.exe

  # ── Linux x64 (AppImage) ─────────────────────────────────────────────────
  linux:
    name: Package Linux x64
    runs-on: ubuntu-latest
    # Grants access to the MW_* secrets (DNS/ACME config embedded at build time).
    environment: MoonlightWeb
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libssl-dev libfuse2 wget

      - uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          modules: qtwebsockets
          # aqt 3.3.0 doesn't know the new Qt 6.11 per-arch repo layout (404s on
          # Updates.xml); pin the commit that added it. py7zr 1.1.0 avoids the 7z
          # path-sanitization bug (aqtinstall#995) that breaks SBOM extraction.
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          py7zrversion: ==1.1.0
          extra: --base https://download.qt.io # official server (fallback mirrors serve incomplete XML)

      - name: Build
        # Internet-Access config embedded at build time from repo secrets (no
        # .env shipped). Empty when a secret is unset → LAN-only fallback.
        env:
          MW_DOMAIN: ${{ secrets.MW_DOMAIN }}
          MW_PDNS_URL: ${{ secrets.MW_PDNS_URL }}
          MW_PDNS_TOKEN: ${{ secrets.MW_PDNS_TOKEN }}
          MW_ZEROSSL_EAB_KID: ${{ secrets.MW_ZEROSSL_EAB_KID }}
          MW_ZEROSSL_EAB_HMAC: ${{ secrets.MW_ZEROSSL_EAB_HMAC }}
        run: |
          cmake -S backend -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp build/moonlight-web AppDir/usr/bin/
          cp -r frontend AppDir/usr/bin/frontend
          cp frontend/assets/icon-512.png AppDir/moonlight-web.png

      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e build/moonlight-web \
            -d backend/packaging/moonlight-web.desktop \
            -i AppDir/moonlight-web.png \
            --plugin qt --output appimage
          mv Moonlight-Web*.AppImage moonlight-web-linux-x64.AppImage

      - uses: softprops/action-gh-release@v2
        with:
          files: moonlight-web-linux-x64.AppImage

  # ── macOS arm64 (.dmg) ───────────────────────────────────────────────────
  macos:
    name: Package macOS arm64
    runs-on: macos-latest
    # Grants access to the MW_* secrets (DNS/ACME config embedded at build time).
    environment: MoonlightWeb
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install cmake ninja openssl@3 pkg-config

      - uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          host: mac
          arch: clang_64 # Qt 6.11 mac desktop is a universal (arm64+x64) binary
          modules: qtwebsockets
          # aqt 3.3.0 doesn't know the new Qt 6.11 per-arch repo layout (404s on
          # Updates.xml); pin the commit that added it. py7zr 1.1.0 avoids the 7z
          # path-sanitization bug (aqtinstall#995) that breaks SBOM extraction.
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          py7zrversion: ==1.1.0
          extra: --base https://download.qt.io # official server (fallback mirrors serve incomplete XML)

      - name: Build
        # Internet-Access config embedded at build time from repo secrets (no
        # .env shipped). Empty when a secret is unset → LAN-only fallback.
        env:
          MW_DOMAIN: ${{ secrets.MW_DOMAIN }}
          MW_PDNS_URL: ${{ secrets.MW_PDNS_URL }}
          MW_PDNS_TOKEN: ${{ secrets.MW_PDNS_TOKEN }}
          MW_ZEROSSL_EAB_KID: ${{ secrets.MW_ZEROSSL_EAB_KID }}
          MW_ZEROSSL_EAB_HMAC: ${{ secrets.MW_ZEROSSL_EAB_HMAC }}
        run: |
          cmake -S backend -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

      - name: Assemble .app bundle
        run: |
          APP=MoonlightWeb.app
          mkdir -p "$APP/Contents/MacOS"
          cp build/moonlight-web "$APP/Contents/MacOS/moonlight-web"
          cp -r frontend "$APP/Contents/MacOS/frontend"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>moonlight-web</string>
            <key>CFBundleIdentifier</key><string>com.moonlightweb.server</string>
            <key>CFBundleName</key><string>Moonlight-Web</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
          </dict></plist>
          PLIST

      - name: Deploy Qt + create DMG
        run: |
          macdeployqt MoonlightWeb.app -dmg
          mv MoonlightWeb.dmg moonlight-web-macos-arm64.dmg

      - uses: softprops/action-gh-release@v2
        with:
          files: moonlight-web-macos-arm64.dmg
