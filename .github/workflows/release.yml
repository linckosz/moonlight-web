# MoonlightWeb — multi-platform release packaging.
#
# On a v* tag, builds self-contained bundles for Windows x64/ARM64 (Inno Setup
# installer), Linux x64 (.deb + .rpm + AppImage) and macOS arm64 (interactive
# .pkg installer), then
# attaches them to the GitHub Release. Each bundle ships the executable, the Qt
# runtime (via the native deploy tool), OpenSSL and the frontend/ served as
# static files (staged by `cmake --install`, which strips dev tooling).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform(s) to build and release"
        type: choice
        default: all
        options:
          - all
          - windows-x64
          - windows-arm64
          - linux
          - macos

permissions:
  contents: write

jobs:
  # ── Platform selection ───────────────────────────────────────────────────
  # Turns the workflow_dispatch `platform` choice (default `all`, and `all` on a
  # v* tag push where the input is unset) into per-job gates. The Windows matrix
  # is emitted as JSON so a single arch can be selected; an empty array skips the
  # Windows job entirely.
  setup:
    runs-on: ubuntu-latest
    outputs:
      windows: ${{ steps.sel.outputs.windows }}
      linux: ${{ steps.sel.outputs.linux }}
      macos: ${{ steps.sel.outputs.macos }}
    steps:
      - id: sel
        env:
          SEL: ${{ github.event.inputs.platform || 'all' }}
        run: |
          x64='{"arch":"x64","runner":"windows-latest","qt_arch":"win64_msvc2022_64","cmake_arch":"x64"}'
          arm='{"arch":"arm64","runner":"windows-11-arm","qt_arch":"win64_msvc2022_arm64","cmake_arch":"ARM64"}'
          win='[]'; lin='false'; mac='false'
          case "$SEL" in
            all)           win="[$x64,$arm]"; lin='true'; mac='true' ;;
            windows-x64)   win="[$x64]" ;;
            windows-arm64) win="[$arm]" ;;
            linux)         lin='true' ;;
            macos)         mac='true' ;;
          esac
          echo "windows=$win" >> "$GITHUB_OUTPUT"
          echo "linux=$lin"   >> "$GITHUB_OUTPUT"
          echo "macos=$mac"   >> "$GITHUB_OUTPUT"

  # ── Windows (x64 + ARM64) ────────────────────────────────────────────────
  windows:
    needs: setup
    if: ${{ needs.setup.outputs.windows != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.windows) }}
    name: Package Windows ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    # Grants access to the MW_* secrets (DNS/ACME config embedded at build time).
    environment: MoonlightWeb
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install OpenSSL (vcpkg, arm64 only)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: vcpkg install openssl:arm64-windows

      - uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          arch: ${{ matrix.qt_arch }}
          modules: qtwebsockets
          # aqt 3.3.0 doesn't know the new Qt 6.11 per-arch repo layout (404s on
          # Updates.xml); pin the commit that added it. py7zr 1.1.0 avoids the 7z
          # path-sanitization bug (aqtinstall#995) that breaks SBOM extraction.
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          py7zrversion: ==1.1.0
          extra: --base https://download.qt.io # official server (fallback mirrors serve incomplete XML)

      # Ninja + MSVC env: the runner's Visual Studio major version changes over
      # time, so avoid the version-pinned "Visual Studio NN" generator.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      # Version from the release tag (v1.2.3 → 1.2.3); git-describe fallback elsewhere.
      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $v = '0.1.0'
          if ($env:GITHUB_REF -like 'refs/tags/v*') { $v = $env:GITHUB_REF_NAME.Substring(1) }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Configure
        shell: pwsh
        # Internet-Access config embedded at build time from repo secrets (no
        # .env shipped). Empty when a secret is unset → LAN-only fallback.
        env:
          MW_DOMAIN: ${{ secrets.MW_DOMAIN }}
          MW_PDNS_URL: ${{ secrets.MW_PDNS_URL }}
          MW_PDNS_TOKEN: ${{ secrets.MW_PDNS_TOKEN }}
          MW_ZEROSSL_EAB_KID: ${{ secrets.MW_ZEROSSL_EAB_KID }}
          MW_ZEROSSL_EAB_HMAC: ${{ secrets.MW_ZEROSSL_EAB_HMAC }}
        run: |
          $args = @("-S","backend","-B","build","-G","Ninja","-DCMAKE_BUILD_TYPE=Release",
                    "-DMW_VERSION=${{ steps.ver.outputs.version }}")
          if ("${{ matrix.arch }}" -eq "arm64") {
            $args += "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
            $args += "-DVCPKG_TARGET_TRIPLET=arm64-windows"
          }
          cmake @args

      - name: Build
        run: cmake --build build -j

      # Archive the debug symbols so a crash minidump (CrashHandler.cpp) from this
      # exact build can be symbolized later. The Release build emits MoonlightWeb.pdb
      # via /DEBUG. Kept as a workflow artifact for maintainers only — NOT attached
      # to the public Release (symbols aid reverse engineering and are not for end
      # users). Retained the default 90 days; download the matching arch's PDB to
      # resolve a dump collected from that release.
      - name: Archive debug symbols (PDB)
        uses: actions/upload-artifact@v6
        with:
          name: MoonlightWeb-pdb-${{ matrix.arch }}-${{ steps.ver.outputs.version }}
          path: build/MoonlightWeb.pdb
          if-no-files-found: error

      - name: Stage bundle
        run: cmake --install build --prefix dist

      - name: Deploy Qt runtime
        run: windeployqt --release dist/MoonlightWeb.exe

      # windeployqt ships only the schannel/certonly TLS backends. Force-copy the
      # OpenSSL backend plugin so QSslSocket::setActiveBackend("openssl") (main.cpp)
      # succeeds; otherwise Qt falls back to Schannel, which cannot load the public
      # ACME PEM key and the browser is served the self-signed cert (CN/SAN error).
      - name: Deploy Qt OpenSSL TLS plugin
        shell: pwsh
        run: |
          $wdq = (Get-Command windeployqt).Source
          $tlsSrc = Join-Path (Split-Path (Split-Path $wdq)) "plugins\tls\qopensslbackend.dll"
          New-Item -ItemType Directory -Force -Path dist\tls | Out-Null
          Copy-Item $tlsSrc dist\tls\qopensslbackend.dll -Force
          Write-Host "Deployed $tlsSrc"

      - name: Bundle OpenSSL (arm64)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: Copy-Item "$env:VCPKG_INSTALLATION_ROOT/installed/arm64-windows/bin/*.dll" dist/ -ErrorAction SilentlyContinue

      # Interactive installer: stepped wizard (Internet authorization, Sunshine
      # detection/silent-install + pairing, Desktop admin shortcut). It is the
      # only Windows artifact shipped (no raw zip).
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        # DNS/ACME secrets are compiled into MoonlightWeb.exe at build time, not
        # passed to the installer — nothing on the user's machine carries them.
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DSourceDir=$(Resolve-Path dist)" `
            "/DMyArch=${{ matrix.arch }}" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "/O$(Get-Location)" `
            backend\installer\moonlightweb.iss

      # Downloadable on every run (incl. workflow_dispatch with no tag).
      - uses: actions/upload-artifact@v6
        with:
          name: MoonlightWeb-windows-${{ matrix.arch }}
          path: MoonlightWeb-installer-${{ steps.ver.outputs.version }}-win-${{ matrix.arch }}.exe

      # Published to the GitHub Release only on a v* tag push.
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: MoonlightWeb-installer-${{ steps.ver.outputs.version }}-win-${{ matrix.arch }}.exe

  # ── Linux x64 (.deb + .rpm + AppImage) ───────────────────────────────────
  # One linuxdeploy AppDir (bundled Qt, $ORIGIN rpaths) feeds all three outputs:
  #   .deb  → Debian/Ubuntu/Mint (double-click install, no chmod)
  #   .rpm  → Fedora/RHEL/openSUSE/Nobara
  #   .AppImage → portable fallback (Arch, immutable gaming distros: SteamOS…)
  linux:
    needs: setup
    if: ${{ needs.setup.outputs.linux == 'true' }}
    name: Package Linux x64
    runs-on: ubuntu-latest
    # Grants access to the MW_* secrets (DNS/ACME config embedded at build time).
    environment: MoonlightWeb
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libssl-dev libfuse2 wget rpm ruby
          # fpm turns the staged tree into .deb + .rpm (see make-packages.sh).
          sudo gem install --no-document fpm

      # Version from the release tag (v1.2.3 → 1.2.3); git-describe fallback elsewhere.
      - name: Compute version
        id: ver
        run: |
          v=0.1.0
          case "$GITHUB_REF" in refs/tags/v*) v="${GITHUB_REF_NAME#v}" ;; esac
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          modules: qtwebsockets
          # aqt 3.3.0 doesn't know the new Qt 6.11 per-arch repo layout (404s on
          # Updates.xml); pin the commit that added it. py7zr 1.1.0 avoids the 7z
          # path-sanitization bug (aqtinstall#995) that breaks SBOM extraction.
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          py7zrversion: ==1.1.0
          extra: --base https://download.qt.io # official server (fallback mirrors serve incomplete XML)

      - name: Build
        # Internet-Access config embedded at build time from repo secrets (no
        # .env shipped). Empty when a secret is unset → LAN-only fallback.
        env:
          MW_DOMAIN: ${{ secrets.MW_DOMAIN }}
          MW_PDNS_URL: ${{ secrets.MW_PDNS_URL }}
          MW_PDNS_TOKEN: ${{ secrets.MW_PDNS_TOKEN }}
          MW_ZEROSSL_EAB_KID: ${{ secrets.MW_ZEROSSL_EAB_KID }}
          MW_ZEROSSL_EAB_HMAC: ${{ secrets.MW_ZEROSSL_EAB_HMAC }}
        run: |
          cmake -S backend -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DMW_VERSION=${{ steps.ver.outputs.version }}
          cmake --build build -j

      # `cmake --install` applies the frontend excludes (node_modules, tests,
      # .claude, lint configs) — never copy frontend/ straight from the checkout.
      - name: Assemble AppDir
        run: |
          cmake --install build --prefix stage
          mkdir -p AppDir/usr/bin
          cp build/MoonlightWeb AppDir/usr/bin/
          cp -r stage/frontend AppDir/usr/bin/frontend
          cp frontend/assets/icon-512.png AppDir/MoonlightWeb.png

      - name: Deploy Qt into AppDir
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            -e build/MoonlightWeb \
            -d backend/packaging/moonlightweb.desktop \
            -i AppDir/MoonlightWeb.png \
            --plugin qt

      # linuxdeploy-plugin-qt only bundles the xcb platform plugin; add the
      # Wayland client plugins so native Wayland sessions (GNOME/KDE defaults)
      # don't warn and fall back to XWayland. Best-effort: Qt prebuilt plugins
      # already carry $ORIGIN/../../lib rpaths matching the AppDir layout, and
      # xcb remains the fallback if anything here is absent.
      - name: Bundle Qt Wayland plugins (best effort)
        run: |
          P="$QT_ROOT_DIR/plugins"; L="$QT_ROOT_DIR/lib"
          if [ -f "$P/platforms/libqwayland-generic.so" ]; then
            cp -a "$P"/platforms/libqwayland-*.so AppDir/usr/plugins/platforms/
            for d in wayland-decoration-client wayland-graphics-integration-client wayland-shell-integration; do
              if [ -d "$P/$d" ]; then cp -a "$P/$d" AppDir/usr/plugins/; fi
            done
            cp -a "$L"/libQt6WaylandClient.so* AppDir/usr/lib/ 2>/dev/null || true
            cp -a "$L"/libQt6WaylandEglClientHwIntegration.so* AppDir/usr/lib/ 2>/dev/null || true
            echo "Wayland client plugins bundled"
          else
            echo "Qt Wayland plugins not present in this Qt install — skipped"
          fi

      # AppImage: portable fallback for distros without deb/rpm (Arch, and
      # immutable gaming distros like SteamOS/Bazzite). Needs chmod +x once.
      - name: Build AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv MoonlightWeb*.AppImage moonlightweb-${{ steps.ver.outputs.version }}-linux-x64.AppImage

      # Native packages: double-click installs via the distro's GUI installer
      # (no chmod needed). .deb → Debian/Ubuntu/Mint, .rpm → Fedora/RHEL/Nobara.
      - name: Build .deb + .rpm
        run: |
          chmod +x backend/packaging/linux/make-packages.sh
          backend/packaging/linux/make-packages.sh AppDir ${{ steps.ver.outputs.version }} .

      - uses: actions/upload-artifact@v6
        with:
          name: moonlightweb-linux-x64
          path: |
            moonlightweb-${{ steps.ver.outputs.version }}-linux-x64.deb
            moonlightweb-${{ steps.ver.outputs.version }}-linux-x64.rpm
            moonlightweb-${{ steps.ver.outputs.version }}-linux-x64.AppImage

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            moonlightweb-${{ steps.ver.outputs.version }}-linux-x64.deb
            moonlightweb-${{ steps.ver.outputs.version }}-linux-x64.rpm
            moonlightweb-${{ steps.ver.outputs.version }}-linux-x64.AppImage

  # ── macOS arm64 (.pkg) ───────────────────────────────────────────────────
  macos:
    needs: setup
    if: ${{ needs.setup.outputs.macos == 'true' }}
    name: Package macOS arm64
    # Pinned (not macos-latest) to avoid the June 2026 macOS 26 auto-migration.
    runs-on: macos-15
    # Grants access to the MW_* secrets (DNS/ACME config embedded at build time).
    environment: MoonlightWeb
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install cmake ninja openssl@3 pkg-config

      - uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          host: mac
          arch: clang_64 # Qt 6.11 mac desktop is a universal (arm64+x64) binary
          modules: qtwebsockets
          # aqt 3.3.0 doesn't know the new Qt 6.11 per-arch repo layout (404s on
          # Updates.xml); pin the commit that added it. py7zr 1.1.0 avoids the 7z
          # path-sanitization bug (aqtinstall#995) that breaks SBOM extraction.
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          py7zrversion: ==1.1.0
          extra: --base https://download.qt.io # official server (fallback mirrors serve incomplete XML)

      # Version from the release tag (v1.2.3 → 1.2.3); git-describe fallback elsewhere.
      - name: Compute version
        id: ver
        run: |
          v=0.1.0
          case "$GITHUB_REF" in refs/tags/v*) v="${GITHUB_REF_NAME#v}" ;; esac
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build
        # Internet-Access config embedded at build time from repo secrets (no
        # .env shipped). Empty when a secret is unset → LAN-only fallback.
        env:
          MW_DOMAIN: ${{ secrets.MW_DOMAIN }}
          MW_PDNS_URL: ${{ secrets.MW_PDNS_URL }}
          MW_PDNS_TOKEN: ${{ secrets.MW_PDNS_TOKEN }}
          MW_ZEROSSL_EAB_KID: ${{ secrets.MW_ZEROSSL_EAB_KID }}
          MW_ZEROSSL_EAB_HMAC: ${{ secrets.MW_ZEROSSL_EAB_HMAC }}
        run: |
          cmake -S backend -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DMW_VERSION=${{ steps.ver.outputs.version }}
          cmake --build build -j

      - name: Assemble .app bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          APP=MoonlightWeb.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp build/MoonlightWeb "$APP/Contents/MacOS/MoonlightWeb"
          # Frontend assets go in Resources/, NOT MacOS/: codesign treats every
          # file under Contents/MacOS as code and rejects non-code assets. The
          # backend falls back to ../Resources/frontend at runtime. `cmake
          # --install` applies the frontend excludes (node_modules, tests,
          # .claude — the dev files that also trip codesign).
          cmake --install build --prefix stage
          cp -r stage/frontend "$APP/Contents/Resources/frontend"

          # App icon: Finder/Dock ignore the bundle without a real .icns, so
          # derive the iconset from the 512px PNG (skip the 1024 @2x variant —
          # upscaling the 512 source buys nothing).
          mkdir icon.iconset
          for s in 16 32 128 256; do
            sips -z $s $s frontend/assets/icon-512.png --out icon.iconset/icon_${s}x${s}.png >/dev/null
            d=$((s * 2))
            sips -z $d $d frontend/assets/icon-512.png --out icon.iconset/icon_${s}x${s}@2x.png >/dev/null
          done
          sips -z 512 512 frontend/assets/icon-512.png --out icon.iconset/icon_512x512.png >/dev/null
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/MoonlightWeb.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>MoonlightWeb</string>
            <key>CFBundleIdentifier</key><string>com.moonlightweb.server</string>
            <key>CFBundleName</key><string>MoonlightWeb</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>MoonlightWeb</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key><string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST

      - name: Deploy Qt + sign bundle
        run: |
          # Deploy the Qt frameworks into the bundle.
          macdeployqt MoonlightWeb.app

          # Ad-hoc re-sign (identity "-"): no Apple Developer account needed, but
          # it stops Gatekeeper flagging the bundle as "damaged". Users still get
          # a one-time "unidentified developer" prompt (right-click → Open).
          #
          # We must NOT use `codesign --deep`: it unreliably re-signs frameworks
          # that already carry a signature. The Qt binaries from aqt are signed
          # with The Qt Company's Team ID; --deep left them intact while the main
          # binary became ad-hoc (empty Team ID), so at launch dyld rejected them
          # with "mapping process and mapped file have different Team IDs" and the
          # app crashed. Instead sign inside-out, explicitly, each Mach-O first,
          # then the app bundle last, forcing every signature to ad-hoc.
          find MoonlightWeb.app/Contents/Frameworks \
            \( -name '*.dylib' -o -name '*.framework' \) -print0 |
            xargs -0 -I {} codesign --force --timestamp=none -s - {}
          # Any plugins deployed alongside (platforms, tls, imageformats, ...).
          find MoonlightWeb.app/Contents/PlugIns -name '*.dylib' -print0 2>/dev/null |
            xargs -0 -I {} codesign --force --timestamp=none -s - {} || true
          # Main executable, then the whole bundle (seals everything above).
          codesign --force --timestamp=none -s - MoonlightWeb.app/Contents/MacOS/MoonlightWeb
          codesign --force --timestamp=none -s - MoonlightWeb.app
          # Verify the seal is internally consistent (no Team-ID mismatch).
          codesign --verify --deep --strict --verbose=2 MoonlightWeb.app

      - name: Build interactive .pkg installer
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        # Compiles the Installer.app plugin (Sunshine credentials + Internet
        # toggle + Sunshine download progress), packs the signed app + the
        # postinstall (installs Sunshine, writes provisioning.json, LaunchAgent,
        # launches the app) into the component pkg, and wraps it in a guided
        # productbuild archive. Pairing + the public A-record run in the app on
        # first launch (Provisioning::applyOnce). Unsigned: no Apple Developer
        # account (same posture as the old ad-hoc DMG).
        run: |
          APP="$PWD/MoonlightWeb.app" \
          OUT="$PWD/moonlightweb-${{ steps.ver.outputs.version }}-macos-arm64.pkg" \
            bash backend/installer/macos/build-pkg.sh

      - uses: actions/upload-artifact@v6
        with:
          name: moonlightweb-macos-arm64
          path: moonlightweb-${{ steps.ver.outputs.version }}-macos-arm64.pkg

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: moonlightweb-${{ steps.ver.outputs.version }}-macos-arm64.pkg
