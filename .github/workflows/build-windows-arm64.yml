# Moonlight-Web — Windows ARM64 build validation (CMake, native runner).
#
# Native arm64 build on the windows-11-arm runner. No committed OpenSSL for
# arm64, so it is provided by vcpkg (arm64-windows triplet) via its toolchain;
# the CMakeLists falls back to find_package when no prebuilt is present.
name: build-windows-arm64

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-arm64:
    name: Backend (Windows ARM64, CMake/MSVC)
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install OpenSSL (vcpkg, arm64)
        shell: pwsh
        run: vcpkg install openssl:arm64-windows

      - name: Install Qt 6.11 (arm64)
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          arch: win64_msvc2022_arm64
          modules: qtwebsockets

      - name: Configure
        shell: pwsh
        run: >
          cmake -S backend -B backend/build/win-arm64
          -G "Visual Studio 17 2022" -A ARM64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=arm64-windows

      - name: Build
        run: cmake --build backend/build/win-arm64 --config Release -j

      - name: Deploy Qt runtime
        run: windeployqt --release backend/build/win-arm64/Release/mw-server.exe

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mw-server-windows-arm64
          path: backend/build/win-arm64/Release
          if-no-files-found: warn
