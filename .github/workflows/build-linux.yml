# Moonlight-Web — Linux x64 build validation (CMake).
#
# Validates that the backend compiles on Ubuntu with the new cross-platform
# CMake toolchain and system deps. First milestone of multi-platform support.
name: build-linux

on:
  pull_request:
  push:
    branches: [main]

jobs:
  linux-x64:
    name: Backend (Ubuntu x64, CMake)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libssl-dev

      - name: Install Qt 6.11
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.11.0
          modules: qtwebsockets

      - name: Configure
        run: cmake -S backend -B backend/build/linux -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build backend/build/linux -j

      - name: Security TNR (ctest)
        run: ctest --test-dir backend/build/linux --output-on-failure

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mw-server-linux-x64
          path: backend/build/linux/mw-server
          if-no-files-found: warn
