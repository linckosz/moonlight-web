name: Build + AddressSanitizer (Windows)

# Heavy job: full MSVC/Qt backend build with AddressSanitizer (-DMW_ASAN=ON).
#
# Manual trigger for now — this needs a first-run shakedown on a clean runner
# (Qt modules, submodule build order). Once the build is green, the remaining
# piece for real value is exercising a stream under ASan so it actually reports
# (the instrumented binary only flags issues while the code runs).

on:
  workflow_dispatch:

jobs:
  asan:
    name: Backend build (ASan)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Qt 6.11
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.0'
          arch: win64_msvc2022_64
          modules: qtwebsockets
          # aqt 3.3.0 doesn't know the new Qt 6.11 per-arch repo layout (404s on
          # Updates.xml); pin the commit that added it. py7zr 1.1.0 avoids the 7z
          # path-sanitization bug (aqtinstall#995) that breaks SBOM extraction.
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b
          py7zrversion: ==1.1.0
          extra: --base https://download.qt.io # official server (fallback mirrors serve incomplete XML)

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # CMake builds the vendored submodules (libdatachannel, miniupnpc, …) and
      # links the instrumented binary in one shot. MW_ASAN adds /fsanitize=address.
      - name: Configure (ASan)
        run: cmake -S backend -B backend/build/asan -G Ninja -DCMAKE_BUILD_TYPE=Release -DMW_ASAN=ON

      - name: Build backend with AddressSanitizer
        run: cmake --build backend/build/asan -j

      - name: Upload ASan binary
        uses: actions/upload-artifact@v6
        with:
          name: moonlightweb-asan
          path: backend/build/asan/MoonlightWeb.exe
          if-no-files-found: error
