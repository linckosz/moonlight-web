<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight-Web</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>Moonlight-Web</h1>
            <span class="version">v0.1.0</span>
        </header>

        <main id="main-content">
            <!-- Welcome / placeholder view -->
            <div id="view-welcome" class="view active">
                <div class="welcome-card">
                    <div class="server-icon">&#9788;</div>
                    <h2>Moonlight-Web Server Ready</h2>
                    <p>Your game streaming server is running.</p>
                    <p>Host discovery and streaming features coming in future phases.</p>
                    <div class="status-bar">
                        <span class="status-dot online"></span>
                        <span>Server online</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <span>Moonlight-Web &mdash; Game Streaming Client</span>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
