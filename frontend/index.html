<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moonlight-Web</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stream.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>Moonlight-Web</h1>
            <span class="version">v0.1.0</span>
            <div class="header-actions">
                <!-- Server Settings (localhost only) -->
                <button class="btn-icon" id="btn-admin" title="Server Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                    </svg>
                </button>
                <!-- Streaming Settings -->
                <button class="btn-icon" id="btn-settings" title="Streaming Settings">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M5 4a1 1 0 00-2 0v7H2a1 1 0 000 2h1v3a1 1 0 002 0v-3h1a1 1 0 000-2H5V4z"/>
                        <path d="M12 6a1 1 0 10-2 0v5H9a1 1 0 100 2h1v3a1 1 0 102 0v-3h1a1 1 0 100-2h-1V6z"/>
                        <path d="M19 9a1 1 0 10-2 0v2h-1a1 1 0 100 2h1v3a1 1 0 102 0v-3h1a1 1 0 100-2h-1V9z"/>
                    </svg>
                </button>
            </div>
        </header>

        <main id="main-content">
            <!-- HostListView renders here -->
        </main>

        <footer class="app-footer">
            <span>Moonlight-Web &mdash; Game Streaming Client</span>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
