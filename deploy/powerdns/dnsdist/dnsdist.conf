-- Moonlight-Web — dnsdist in front of PowerDNS (anti-amplification / DoS).
-- Public DNS entry point on :53; forwards accepted queries to the pdns backend.
-- Loaded from the default path (/etc/dnsdist/dnsdist.conf) by the official image.

-- Listen for public DNS (UDP + TCP).
setLocal("0.0.0.0:53")
addLocal("[::]:53")

-- This is an AUTHORITATIVE public server: it must answer the whole Internet.
-- dnsdist's default ACL only allows RFC1918 ranges, so widen it explicitly.
setACL({"0.0.0.0/0", "::/0"})

-- Backend: the PowerDNS authoritative server (internal compose network).
-- dnsdist's newServer needs a LITERAL IP (it does not resolve container names),
-- so pdns has a fixed address in docker-compose.yml (172.28.0.10). Keep in sync.
newServer({address = "172.28.0.10:5300", name = "pdns"})
-- Single backend on a trusted private link: pin it up so dnsdist's active
-- health checks (which probe a name pdns won't serve) can't black-hole it.
getServer(0):setUp()

-- ── Anti-amplification / flood protection ───────────────────────────────────
-- Drop any client exceeding 50 qps (averaged), grouped per /32 (v4) and /64 (v6).
-- Tune the first argument up/down for your traffic.
addAction(MaxQPSIPRule(50, 32, 64), DropAction())

-- Force ANY queries to TCP — defangs UDP reflection/amplification abuse.
addAction(QTypeRule(DNSQType.ANY), TCAction())
