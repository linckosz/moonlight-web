# MoonlightWeb hardening snippet for the official PowerDNS image.
# Dropped into /etc/powerdns/pdns.d/ — merged via the base image's include-dir.
#
# Only the EXTRA settings from the reference VM are here. launch=gsqlite3,
# gsqlite3-dnssec, gsqlite3-database and local-address already come from the
# image's default pdns.conf; api/api-key/webserver come from the _api.conf that
# the official startup wrapper generates from PDNS_AUTH_API_KEY.
#
# The "zz-" prefix makes this file sort AFTER _api.conf, so the settings below
# win where they overlap.

# ── DNS port: dnsdist fronts the public :53 and forwards here ────────────────
local-port=5300

# ── Sane SOA for newly created zones ─────────────────────────────────────────
# The image default is "a.misconfigured.dns.server.invalid hostmaster.@ ...",
# which registrars and DNS checkers flag. "@" expands to the zone name.
default-soa-content=ns1.@ hostmaster.@ 0 10800 3600 604800 3600

# ── Hardening / behaviour (from the reference VM) ────────────────────────────
disable-axfr=yes
allow-axfr-ips=127.0.0.1
any-to-tcp=yes
edns-subnet-processing=no
version-string=anonymous
security-poll-suffix=
max-tcp-connections=20
receiver-threads=2
overload-queue-length=2000

# ── REST API: reachable only by the Caddy container on the compose network ───
# Port 8081 is never published to the host; Caddy is the only HTTPS front door.
webserver-address=0.0.0.0
webserver-allow-from=127.0.0.1,::1,172.16.0.0/12,10.0.0.0/8,192.168.0.0/16
