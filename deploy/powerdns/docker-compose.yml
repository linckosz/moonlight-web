# MoonlightWeb — self-hosted DNS stack (5 dedicated containers).
#
#   dnsdist  public DNS entry point :53  → pdns:5300  (anti-amplification, rate-limit)
#   pdns     official PowerDNS image, internal only    (DNS :5300 + REST API :8081)
#   caddy    public :80/:443 → pdns:8081 / umami:3000  (HTTPS API + site + stats, auto-TLS)
#   umami    web analytics (stats.{domain}), internal  → umami-db (Postgres)
#   umami-db Postgres for Umami, internal only
#
# Quick start:
#   cd deploy/powerdns
#   cp .env.sample .env      # edit MW_DOMAIN / MW_PUBLIC_IP / MW_PDNS_API_KEY
#   docker compose up -d --build
#
# Point your registrar's glue/NS records at MW_PUBLIC_IP (see README.md).

services:
  # ── PowerDNS authoritative server (internal only) ──────────────────────────
  pdns:
    image: powerdns/pdns-auth-49:latest
    container_name: moonlight-pdns
    restart: unless-stopped
    # tini for clean signals; init.sh bootstraps the zone then execs the
    # official startup wrapper. Runs as the image's non-root pdns user.
    entrypoint: ["/usr/bin/tini", "--", "sh", "/mw/init.sh"]
    environment:
      MW_DOMAIN: ${MW_DOMAIN}
      MW_PUBLIC_IP: ${MW_PUBLIC_IP}
      # User-facing key from .env, mapped to the var the official wrapper reads.
      PDNS_AUTH_API_KEY: ${MW_PDNS_API_KEY}
    volumes:
      - pdns_data:/var/lib/powerdns                 # zone DB persists
      - ./pdns/zz-mw.conf:/etc/powerdns/pdns.d/zz-mw.conf:ro
      - ./pdns/init.sh:/mw/init.sh:ro
    networks:
      mwnet:
        # Fixed IP: dnsdist's newServer needs a literal address (it does not
        # resolve container names). Must match dnsdist/dnsdist.conf.
        ipv4_address: 172.28.0.10
    # No published ports: only dnsdist (DNS) and caddy (API) reach it internally.
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]                               # high ports → no caps needed
    pids_limit: 200
    mem_limit: 512m

  # ── dnsdist: public DNS front (DoS / amplification protection) ─────────────
  dnsdist:
    image: powerdns/dnsdist-19:latest
    container_name: moonlight-dnsdist
    restart: unless-stopped
    depends_on: [pdns]
    volumes:
      - ./dnsdist/dnsdist.conf:/etc/dnsdist/dnsdist.conf:ro
    ports:
      - "53:53/udp"      # public authoritative DNS (primary path)
      - "53:53/tcp"      # public DNS (truncated answers, DNSSEC)
    networks: [mwnet]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]                   # bind :53
    # dnsdist pre-allocates many sockets (per-IP QPS tracking); raise the FD
    # limit above its ~10k need, otherwise it warns at startup.
    ulimits:
      nofile: { soft: 16384, hard: 16384 }
    pids_limit: 200
    mem_limit: 256m

  # ── Caddy: HTTPS reverse proxy in front of the PowerDNS API ────────────────
  caddy:
    build: ./caddy
    image: moonlight-caddy:latest
    container_name: moonlight-caddy
    restart: unless-stopped
    depends_on: [pdns]
    environment:
      MW_DOMAIN: ${MW_DOMAIN}
      # Optional user-supplied TLS cert (takes priority over Let's Encrypt).
      # Paths must resolve INSIDE the container — see the ./certs mount below.
      MW_TLS_CERT: ${MW_TLS_CERT:-}
      MW_TLS_KEY: ${MW_TLS_KEY:-}
      MW_TLS_EMAIL: ${MW_TLS_EMAIL:-}
    ports:
      - "80:80/tcp"      # Let's Encrypt HTTP-01 challenge
      - "443:443/tcp"    # PowerDNS REST API over HTTPS (api.${MW_DOMAIN})
    volumes:
      - caddy_data:/data             # cert storage (Let's Encrypt)
      - caddy_config:/config
      - ./certs:/certs:ro            # your own certs when using MW_TLS_CERT/KEY
      - ../../website:/srv/site:ro   # presentation website (repo-root ./website)
    networks: [mwnet]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]                   # bind :80 / :443
    pids_limit: 200
    mem_limit: 256m

  # ── Umami: privacy-friendly, cookieless web analytics ──────────────────────
  # Serves the presentation-site stats at https://stats.${MW_DOMAIN} (via caddy).
  # Internal only — never published to the host; caddy reverse-proxies :3000.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: moonlight-umami
    restart: unless-stopped
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://umami:${MW_UMAMI_DB_PASSWORD}@umami-db:5432/umami
      # Signs the auth cookies / API tokens of the Umami DASHBOARD (admin login),
      # not the tracked visitors (analytics stays cookieless). Keep it secret.
      APP_SECRET: ${MW_UMAMI_SECRET}
    networks: [mwnet]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 200
    mem_limit: 512m

  umami-db:
    image: postgres:16-alpine
    container_name: moonlight-umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${MW_UMAMI_DB_PASSWORD}
    volumes:
      - umami_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mwnet]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 200
    mem_limit: 256m

volumes:
  pdns_data:
  caddy_data:
  caddy_config:
  umami_db:

networks:
  mwnet:
    driver: bridge
    # Fixed subnet so pdns can keep a stable IP for dnsdist's backend address.
    ipam:
      config:
        - subnet: 172.28.0.0/24
